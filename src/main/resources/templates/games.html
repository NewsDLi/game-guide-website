<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏库 - 游戏攻略站</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<main>
    <section class="section">
        <div class="container">
            <h2 style="margin-bottom: 20px;">游戏库</h2>

            <div class="category-bar" id="categoryBar">
                <span class="category-tag active" data-cat="">全部</span>
                <span class="category-tag" data-cat="RPG">RPG</span>
                <span class="category-tag" data-cat="FPS">FPS</span>
                <span class="category-tag" data-cat="MMO">MMO</span>
                <span class="category-tag" data-cat="动作">动作</span>
                <span class="category-tag" data-cat="策略">策略</span>
            </div>

            <div class="game-grid" id="gameList"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </section>
</main>

<footer class="footer">
    <div class="container">
        <div class="footer-links">
                    <a href="/about">关于我们</a>
                    <a href="/contact">联系我们</a>
                    <a href="/disclaimer">免责申明</a>
                    <a href="/privacy">隐私政策</a>
                </div>
        <p>&copy; 2026 游戏攻略站 — 为玩家而生</p>
    </div>
</footer>

<div th:replace="fragments/header :: auth-script"></div>

<script>
let currentCat = '';
let currentPage = 1;

function loadGames() {
    api(`/api/game/list?category=${currentCat}&page=${currentPage}&size=12`).then(r => {
        if (r.code === 200) {
            document.getElementById('gameList').innerHTML = r.data.list.length ?
                r.data.list.map(g => `
                    <a href="/game-detail?id=${g.id}" class="game-card">
                        <div class="game-card-cover">${g.cover ? `<img src="${g.cover}" alt="${g.name}" style="width:100%;height:100%;object-fit:cover;">` : '&#127918;'}</div>
                        <div class="game-card-body">
                            <h3>${g.name}</h3>
                            <div class="game-card-meta">
                                <span class="rating">&#9733; ${g.rating}</span>
                                <span>${g.category}</span>
                                <span>${g.guideCount} 篇攻略</span>
                            </div>
                            <div class="game-card-desc">${g.description || ''}</div>
                        </div>
                    </a>
                `).join('') :
                '<div class="empty"><div class="icon">&#127918;</div><p>暂无该分类的游戏</p></div>';

            // pagination
            const totalPages = Math.ceil(r.data.total / r.data.size);
            let pagHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                pagHtml += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
            }
            document.getElementById('pagination').innerHTML = totalPages > 1 ? pagHtml : '';
        }
    });
}

function goPage(p) {
    currentPage = p;
    loadGames();
    window.scrollTo(0, 0);
}

document.querySelectorAll('#categoryBar .category-tag').forEach(el => {
    el.addEventListener('click', function() {
        document.querySelectorAll('#categoryBar .category-tag').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        currentCat = this.dataset.cat;
        currentPage = 1;
        loadGames();
    });
});

loadGames();
</script>
</body>
</html>
