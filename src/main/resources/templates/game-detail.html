<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${gameName} ?: '游戏详情'">游戏详情 - 游戏攻略站</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<main>
    <section class="section">
        <div class="container">
            <div id="gameInfo"></div>

            <div class="section-title" style="margin-top: 32px;">
                <span>攻略列表</span>
                <div class="category-bar" style="margin-bottom: 0;">
                    <span class="category-tag active" data-order="new">最新</span>
                    <span class="category-tag" data-order="like">最多点赞</span>
                </div>
            </div>
            <div class="guide-list" id="guideList"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </section>
</main>

<footer class="footer">
    <div class="container">
        <div class="footer-links">
                    <a href="/about">关于我们</a>
                    <a href="/contact">联系我们</a>
                    <a href="/disclaimer">免责申明</a>
                    <a href="/privacy">隐私政策</a>
                </div>
        <p>&copy; 2026 游戏攻略站 — 为玩家而生</p>
    </div>
</footer>

<div th:replace="fragments/header :: auth-script"></div>

<script>
const params = new URLSearchParams(window.location.search);
const gameId = params.get('id');
let orderBy = 'new';
let currentPage = 1;

if (!gameId) { window.location.href = '/games'; }

// Load game info
api('/api/game/' + gameId).then(r => {
    if (r.code === 200) {
        const g = r.data;
        document.title = g.name + ' - 游戏攻略站';
        document.getElementById('gameInfo').innerHTML = `
            <div style="display: flex; gap: 24px; align-items: flex-start;">
                <div style="width:200px;height:140px;border-radius:12px;flex-shrink:0;overflow:hidden;background:linear-gradient(135deg, #667eea, #764ba2);display:flex;align-items:center;justify-content:center;font-size:3rem;color:#fff;">${g.cover ? `<img src="${g.cover}" alt="${g.name}" style="width:100%;height:100%;object-fit:cover;">` : '&#127918;'}</div>
                <div>
                    <h1 style="font-size: 1.8rem; margin-bottom: 8px;">${g.name}</h1>
                    <div class="guide-meta" style="margin-bottom: 12px;">
                        <span class="rating" style="color: var(--accent); font-size: 1.1rem;">&#9733; ${g.rating}</span>
                        <span>${g.category}</span>
                        <span>${g.guideCount} 篇攻略</span>
                    </div>
                    <p style="color: var(--text-light);">${g.description || ''}</p>
                    ${isLoggedIn() ? '<a href="/guide-editor?gameId=' + g.id + '" class="btn btn-primary" style="margin-top: 12px;">写攻略</a>' : ''}
                </div>
            </div>
        `;
    }
});

function loadGuides() {
    api('/api/guide/list?gameId=' + gameId + '&orderBy=' + orderBy + '&page=' + currentPage + '&size=10').then(r => {
        if (r.code === 200) {
            document.getElementById('guideList').innerHTML = r.data.list.length ?
                r.data.list.map(g => `
                    <a href="/guide-detail?id=${g.id}" class="guide-card">
                        <div class="guide-card-cover">${g.cover ? `<img src="${g.cover}" alt="${g.title}" style="width:100%;height:100%;object-fit:cover;">` : '&#128214;'}</div>
                        <div class="guide-card-body">
                            <h3>${g.title}</h3>
                            <div class="guide-summary">${g.summary || ''}</div>
                            <div class="guide-tags">${(g.tags || '').split(',').filter(Boolean).map(t => `<span class="tag">${t.trim()}</span>`).join('')}</div>
                            <div class="guide-meta">
                                <span>&#128100; ${g.authorName || '未知'}</span>
                                <span>&#128064; ${g.viewCount}</span>
                                <span>&#10084; ${g.likeCount}</span>
                                <span>&#128172; ${g.commentCount}</span>
                                <span>${formatDate(g.createdAt)}</span>
                            </div>
                        </div>
                    </a>
                `).join('') :
                '<div class="empty"><div class="icon">&#128214;</div><p>暂无攻略，快来写第一篇吧</p></div>';

            const totalPages = Math.ceil(r.data.total / r.data.size);
            let pagHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                pagHtml += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
            }
            document.getElementById('pagination').innerHTML = totalPages > 1 ? pagHtml : '';
        }
    });
}

function goPage(p) {
    currentPage = p;
    loadGuides();
    window.scrollTo(0, 400);
}

document.querySelectorAll('.category-bar .category-tag').forEach(el => {
    el.addEventListener('click', function() {
        document.querySelectorAll('.category-bar .category-tag').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        orderBy = this.dataset.order;
        currentPage = 1;
        loadGuides();
    });
});

loadGuides();
</script>
</body>
</html>
