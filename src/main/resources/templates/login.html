<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - 游戏攻略站</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<main class="auth-page">
    <div class="auth-card">
        <h2>游戏攻略站</h2>
        <div class="auth-tabs">
            <div class="auth-tab active" data-tab="login">登录</div>
            <div class="auth-tab" data-tab="register">注册</div>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" class="form-input" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" class="form-input" required placeholder="请输入密码">
            </div>
            <div class="form-error" id="loginError"></div>
            <button type="submit" class="btn btn-primary btn-block">登录</button>
            <p style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--text-light);">
                测试账号: demo / 123456 &nbsp;|&nbsp; 管理员: admin / 123456
            </p>
        </form>

        <!-- Register Form (hidden by default) -->
        <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" class="form-input" required placeholder="3-32位，字母或数字">
            </div>
            <div class="form-group">
                <label>昵称</label>
                <input type="text" name="nickname" class="form-input" placeholder="选填，默认同用户名">
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" name="email" class="form-input" placeholder="选填">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" class="form-input" required placeholder="6位以上">
            </div>
            <div class="form-error" id="registerError"></div>
            <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <div class="footer-links">
                    <a href="/about">关于我们</a>
                    <a href="/contact">联系我们</a>
                    <a href="/disclaimer">免责申明</a>
                    <a href="/privacy">隐私政策</a>
                </div>
        <p>&copy; 2026 游戏攻略站 — 为玩家而生</p>
    </div>
</footer>

<div th:replace="fragments/header :: auth-script"></div>

<script>
// Tab switching
document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.addEventListener('click', function() {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const target = this.dataset.tab;
        document.getElementById('loginForm').style.display = target === 'login' ? '' : 'none';
        document.getElementById('registerForm').style.display = target === 'register' ? '' : 'none';
        document.getElementById('loginError').textContent = '';
        document.getElementById('registerError').textContent = '';
    });
});

function handleLogin(e) {
    e.preventDefault();
    const form = e.target;
    const body = {
        username: form.username.value.trim(),
        password: form.password.value
    };
    fetch('/api/user/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    }).then(r => r.json()).then(r => {
        if (r.code === 200) {
            localStorage.setItem('token', r.data.token);
            localStorage.setItem('userInfo', JSON.stringify(r.data.userInfo));
            window.location.href = document.referrer && !document.referrer.includes('/login') ? document.referrer : '/';
        } else {
            document.getElementById('loginError').textContent = r.message || '登录失败';
        }
    });
}

function handleRegister(e) {
    e.preventDefault();
    const form = e.target;
    const body = {
        username: form.username.value.trim(),
        nickname: form.nickname.value.trim() || null,
        email: form.email.value.trim() || null,
        password: form.password.value
    };
    fetch('/api/user/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    }).then(r => r.json()).then(r => {
        if (r.code === 200) {
            showToast('注册成功，请登录');
            document.querySelector('.auth-tab[data-tab="login"]').click();
            document.getElementById('loginForm').querySelector('input[name="username"]').value = body.username;
        } else {
            document.getElementById('registerError').textContent = r.message || '注册失败';
        }
    });
}
</script>
</body>
</html>
