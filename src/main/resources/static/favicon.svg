<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#4a42d4"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Gamepad body -->
  <g transform="translate(10,20)">
    <!-- Cross shape -->
    <rect x="20" y="0" width="4" height="12" rx="2" fill="#f0c040"/>
    <rect x="16" y="4" width="12" height="4" rx="2" fill="#f0c040"/>
    <!-- D-pad left -->
    <circle cx="8" cy="16" r="3" fill="#fff"/>
    <!-- D-pad right buttons -->
    <circle cx="32" cy="12" r="3" fill="#e74c3c"/>
    <circle cx="36" cy="16" r="3" fill="#2ecc71"/>
    <circle cx="32" cy="20" r="3" fill="#3498db"/>
    <circle cx="28" cy="16" r="3" fill="#f0c040"/>
  </g>
</svg>
